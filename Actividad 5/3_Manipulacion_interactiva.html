<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transformaciones 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }

        /* PANEL DE INSTRUCCIONES */
        #instrucciones {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            max-width: 250px;
        }
    </style>
</head>
<body>

<!-- INSTRUCCIONES -->
<div id="instrucciones">
    <strong>Controles:</strong><br><br>
    🔹 Flechas → Traslación<br>
    🔹 R → Rotación<br>
    🔹 + → Escalar más<br>
    🔹 - → Escalar menos
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshNormalMaterial();
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    window.addEventListener('keydown', (event) => {
        switch (event.key) {
            case 'ArrowRight': cube.position.x += 0.2; break;
            case 'ArrowLeft': cube.position.x -= 0.2; break;
            case 'ArrowUp': cube.position.y += 0.2; break;
            case 'ArrowDown': cube.position.y -= 0.2; break;

            case 'r':
            case 'R':
                cube.rotation.y += 0.2;
                break;

            case '+':
            case '=':
                cube.scale.x += 0.1;
                cube.scale.y += 0.1;
                cube.scale.z += 0.1;
                break;

            case '-':
                cube.scale.x -= 0.1;
                cube.scale.y -= 0.1;
                cube.scale.z -= 0.1;
                break;
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>
